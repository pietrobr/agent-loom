# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: agentloom
metadata:
  template: agentloom@1.0.0
infra:
  provider: bicep
  path: infra
  module: main
services:
  backend:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: ../
  admin-designer:
    project: ./admin-designer
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      context: ../
      buildArgs:
        - APP_BUILD=${APP_BUILD}
    # Service-level hook so the build number is stamped on EVERY build of this
    # app — including a stand-alone `azd deploy admin-designer` (image-only),
    # not just a full `azd up`. It writes the git commit count to
    # admin-designer/build-number.txt, which IS in the Docker build context and
    # is read by vite.config.ts. (A plain `azd env set APP_BUILD` is NOT enough:
    # azd resolves Docker build-args from the OS env, not the azd .env file.)
    # NB: service hooks run with the working dir set to this service's folder,
    # so the path is relative to admin-designer/.
    hooks:
      prepackage:
        windows:
          shell: pwsh
          run: git rev-list --count HEAD | Out-File -Encoding ascii -NoNewline build-number.txt
        posix:
          shell: sh
          run: git rev-list --count HEAD | tr -d '\n' > build-number.txt
  customer-webapp:
    project: ./customer-webapp
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      context: ../
hooks:
  postdeploy:
    windows:
      shell: pwsh
      run: ./scripts/setup.ps1
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: ./scripts/setup.sh
      continueOnError: false
      interactive: true
