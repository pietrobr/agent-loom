# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: agentloom
metadata:
  template: agentloom@1.0.0
infra:
  provider: bicep
  path: infra
  module: main
services:
  backend:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      context: ../
  admin-designer:
    project: ./admin-designer
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      context: ../
  customer-webapp:
    project: ./customer-webapp
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      context: ../
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: ./scripts/setup.ps1
      continueOnError: false
      interactive: true
    posix:
      shell: sh
      run: ./scripts/setup.sh
      continueOnError: false
      interactive: true
