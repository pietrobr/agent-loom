<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Meridian HR CV screener">
  <defs>
    <linearGradient id="hrBg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F6FEB"/>
      <stop offset="1" stop-color="#1B4DB1"/>
    </linearGradient>
    <clipPath id="hrDoc">
      <rect x="22" y="18" width="20" height="26" rx="3"/>
    </clipPath>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#hrBg)"/>
  <!-- CV document -->
  <rect x="22" y="18" width="20" height="26" rx="3" fill="#FFFFFF"/>
  <!-- candidate avatar on the CV -->
  <circle cx="29" cy="26" r="3" fill="#1F6FEB"/>
  <path d="M25 33c0-2.2 1.8-4 4-4s4 1.8 4 4" fill="#1F6FEB"/>
  <!-- text lines -->
  <g stroke="#9DBDF5" stroke-width="2" stroke-linecap="round">
    <path d="M34.5 24h4"/>
    <path d="M34.5 28h4"/>
    <path d="M26 38h12"/>
    <path d="M26 41.5h8"/>
  </g>
  <!-- scanning line sweeping the CV -->
  <g clip-path="url(#hrDoc)">
    <rect x="22" y="18" width="20" height="3.4" fill="#7FE0FF" opacity="0.9">
      <animate attributeName="y" values="18;40.6;18" keyTimes="0;0.5;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- approval check pulsing -->
  <g>
    <circle cx="44" cy="44" r="8" fill="#22C55E">
      <animate attributeName="opacity" values="0.55;1;0.55" keyTimes="0;0.5;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M40.5 44.2l2.4 2.4 4.6-4.8" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
