<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Stride Labs running assistant">
  <defs>
    <linearGradient id="slBg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8552D"/>
      <stop offset="1" stop-color="#B63A18"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#slBg)"/>
  <!-- motion speed lines sweeping -->
  <g stroke="#FFD9C7" stroke-width="2.6" stroke-linecap="round">
    <path d="M12 24h12">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.1s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="20;26;20" dur="1.1s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M12 32h16">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.1s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="24;30;24" dur="1.1s" begin="0.15s" repeatCount="indefinite"/>
    </path>
    <path d="M12 40h10">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="18;24;18" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- running shoe (simple sole + swoosh), gently bobbing -->
  <g>
    <path d="M30 40c0-2 1-4 3-5l6-3c2-1 4 0 6 1l5 3c2 1 3 2 3 4 0 1.5-1.2 3-3 3H33c-1.6 0-3-1.2-3-3z"
          fill="#FFFFFF"/>
    <path d="M33 35c2 1 4 1 6 0" stroke="#E8552D" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M30 44h26" stroke="#7A2410" stroke-width="2.4" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -2.4; 0 0" keyTimes="0;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </g>
</svg>
