<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Horizon Travel assistant">
  <defs>
    <linearGradient id="htBg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E7C86"/>
      <stop offset="1" stop-color="#0A5A62"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#htBg)"/>
  <!-- robot head -->
  <g stroke="#EAFBFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="19" y="22" width="26" height="20" rx="7"/>
    <path d="M32 16V22"/>
  </g>
  <circle cx="32" cy="15" r="2.6" fill="#FFFFFF"/>
  <!-- eyes: gentle blink -->
  <g fill="#FFFFFF">
    <circle cx="26.5" cy="32" r="2.6">
      <animate attributeName="ry" values="2.6;0.4;2.6" keyTimes="0;0.5;1" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="37.5" cy="32" r="2.6">
      <animate attributeName="ry" values="2.6;0.4;2.6" keyTimes="0;0.5;1" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- orbiting "concierge" dot, like a radar sweep around the head -->
  <circle cx="50" cy="32" r="3.2" fill="#7FE7DD">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
