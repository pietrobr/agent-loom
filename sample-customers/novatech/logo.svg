<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="NovaTech helpdesk assistant">
  <defs>
    <linearGradient id="ntBg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#ntBg)"/>
  <!-- chat bubble -->
  <path d="M16 22a6 6 0 0 1 6-6h20a6 6 0 0 1 6 6v12a6 6 0 0 1-6 6H30l-8 7v-7h-0a6 6 0 0 1-6-6z"
        fill="#FFFFFF" opacity="0.96"/>
  <!-- typing dots -->
  <g fill="#7C3AED">
    <circle cx="26" cy="28" r="3">
      <animate attributeName="cy" values="28;23;28" keyTimes="0;0.5;1" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="28" r="3">
      <animate attributeName="cy" values="28;23;28" keyTimes="0;0.5;1" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="28" r="3">
      <animate attributeName="cy" values="28;23;28" keyTimes="0;0.5;1" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- spark -->
  <circle cx="48" cy="16" r="2.4" fill="#C4B5FD">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
